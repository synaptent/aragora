"aragora/server/handlers/_analytics_metrics_impl.py" = ["BLE001", "G004"]
"aragora/server/handlers/social/_slack_impl/*.py" = ["BLE001", "G004"]
"aragora/server/handlers/bots/*.py" = ["BLE001", "G004"]
"aragora/gateway/enterprise/audit_interceptor*.py" = ["BLE001", "G004"]
"aragora/gateway/enterprise/audit_interceptor/*.py" = ["BLE001", "G004"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["."]
timeout = 60
timeout_method = "thread"
filterwarnings = [
    # Show deprecation warnings once per location (don't suppress — catch regressions early)
    "default::DeprecationWarning",
    "default::PendingDeprecationWarning",
    # Ignore pytest collection warnings for non-test classes in pipeline/test_plan.py
    "ignore:cannot collect test class.*:pytest.PytestCollectionWarning",
    # Ignore unawaited coroutine warnings from AsyncMock cleanup during tests
    "ignore:coroutine .* was never awaited:RuntimeWarning",
    # Suppress pyiceberg Pydantic V2.12 deprecation warnings (transitive dep via storage3;
    # fixed in pyiceberg 0.11.0 — remove this filter after upgrading)
    "ignore::pydantic.warnings.PydanticDeprecatedSince212:pyiceberg",
    # Suppress pyiceberg parser deprecation warnings from upstream pyparsing API renames.
    # Use DeprecationWarning to avoid importing optional pyparsing at pytest-config parse time.
    # Remove after pyiceberg updates parser calls (enablePackrat/escChar/unquoteResults).
    "ignore::DeprecationWarning:pyiceberg.expressions.parser",
]
markers = [
    "unit: marks tests as fast unit tests (run with '-m unit')",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "load: marks tests as load/stress tests (deselect with '-m \"not load\"')",
    "integration: marks tests as integration tests",
    "integration_minimal: marks integration tests safe to run without external services",
    "e2e: marks tests as end-to-end tests (require running server)",
    "serial: marks tests that must run serially (use with 'pytest -p no:xdist' or '-n0')",
    "knowledge: marks tests for knowledge mound features",
    "new_features: marks tests for new feature E2E testing",
    "experimental: marks tests for experimental/unstable features",
    "external: marks tests requiring external services (APIs, databases)",
    "benchmark: marks benchmark tests (run separately from unit suite)",
    "smoke: marks critical smoke tests for fast CI gating (run with '-m smoke')",
    "flaky: marks tests with known intermittent failures",
    "requires_server: marks tests that need a running Aragora server",
    "audit: marks tests for audit trail retention and SOC 2 compliance",
    "compliance: marks tests for compliance APIs (SOC 2, GDPR, CCPA)",
    "performance: marks tests for performance SLA validation (latency, throughput)",
    "privacy: marks tests for privacy workflows (GDPR/CCPA/consent)",
    "enterprise: marks tests for enterprise-only features (SSO, multi-tenancy, audit)",
    "rate_limit_test: marks tests that need real rate limiter behavior (opts out of global bypass)",
    "no_auto_auth: marks tests that need real authentication (opts out of global RBAC bypass)",
    "network: marks tests that make real network calls",
]
# Automatically rerun flaky tests up to 3 times
# pytest-randomly: Tests run in random order by default to detect pollution
# To reproduce a specific order: pytest -p randomly --randomly-seed=<seed>
# To disable randomization: pytest -p no:randomly
addopts = "--import-mode=importlib --reruns 3 --reruns-delay 1 --only-rerun AssertionError --only-rerun RuntimeError --only-rerun KeyError --only-rerun TypeError --only-rerun SecretNotFoundError --only-rerun ModuleNotFoundError --only-rerun AttributeError"
# Parallel test execution: pip install pytest-xdist && pytest -n auto
# To run serial-only tests: pytest -m serial -n0

[tool.mypy]
python_version = "3.11"
mypy_path = "typings"
warn_return_any = false
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = false
ignore_missing_imports = true
exclude = [
    "tests/",
    "build/",
    "dist/",
    ".venv/",
    "node_modules/",
]
# Start non-strict globally, enable per-module
check_untyped_defs = false
disallow_untyped_defs = false
strict_optional = false

# Strict settings for core modules (enable incrementally)
[[tool.mypy.overrides]]
module = "aragora.nomic.meta_planner"
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
warn_return_any = true
warn_unreachable = true
strict = true

