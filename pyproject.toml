# Ignore errors in scripts (not part of main package)
[[tool.mypy.overrides]]
module = [
    "scripts.*",
]
ignore_errors = true

# Mixin modules use cross-class attribute access that mypy cannot resolve
# These will be properly typed when converted to Protocol-based typing
[[tool.mypy.overrides]]
module = [
    "aragora.server.handlers.workspace.crud",
    "aragora.server.handlers.workspace.members",
    "aragora.server.handlers.workspace.policies",
    "aragora.server.handlers.workspace.settings",
    "aragora.server.handlers.social.telegram.commands",
    "aragora.server.handlers.social.telegram.callbacks",
    "aragora.server.handlers.social.telegram.webhooks",
    "aragora.server.handlers.social.telegram._common",
]
disable_error_code = ["attr-defined"]

# LangChain integration uses try/except import fallbacks for langchain_core vs
# legacy langchain package compatibility. The intentional redefinitions trigger
# no-redef which cannot be suppressed inline (linter strips type: ignore comments).
[[tool.mypy.overrides]]
module = [
    "aragora.integrations.langchain.callbacks",
    "aragora.integrations.langchain.chains",
    "aragora.integrations.langchain.retriever",
    "aragora.integrations.langchain.tools",
]
disable_error_code = ["no-redef"]

[tool.mutmut]
# Note: mutmut v3.4.0 has a bug parsing paths_to_mutate from pyproject.toml
# For now, use: mutmut run aragora/ranking/elo_core.py (positional arg)
# Or downgrade to mutmut v2.x which uses different config format
paths_to_mutate = "aragora/"
tests_dir = "tests/"
runner = "python -m pytest -x --tb=no -q"
dict_synonyms = "Struct,NamedTuple,Dict"
backup = false

# Coverage configuration
[tool.coverage.run]
branch = true
source = ["aragora"]
omit = [
    "tests/*",
    "*/__pycache__/*",
    "aragora/live/*",  # Frontend code
    "*/migrations/*",
]

[tool.coverage.report]
# Coverage threshold - incrementally raised
# 19% (initial) -> 30% (Sprint 2.1) -> 45% (Sprint 9) -> 65% (Jan 2026) -> 68% -> 70% (Feb 2026)
# Enterprise modules (control_plane, tenancy, policy, privacy) at 70%
# 19% (initial) -> 30% (Sprint 2.1) -> 45% (Sprint 9) -> 65% (Jan 2026) -> 68% -> 70% -> 71% -> 73% (Feb 2026)
# Target: 80% by end of Q2 2026
fail_under = 73
show_missing = true
skip_covered = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@overload",
    "\\.\\.\\.",  # Ellipsis
]

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.xml]
output = "coverage.xml"

[tool.bandit]
# Security linting configuration
exclude_dirs = ["tests", "node_modules", ".venv", "venv", "build", "dist"]
skips = [
    "B101",  # assert_used - OK in tests
    "B104",  # hardcoded_bind_all_interfaces - OK for dev server
    "B310",  # urllib_urlopen - OK, we validate URLs before opening
    "B311",  # random - OK for non-crypto uses
]
# Target confidence level
confidence = "HIGH"
