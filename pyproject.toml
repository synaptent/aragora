[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aragora"
version = "2.8.0"
description = "Control plane for multi-agent vetted decisionmaking across org knowledge and channels"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [
    {name = "Agora Contributors"}
]
keywords = [
    "ai",
    "multi-agent",
    "control-plane",
    "deliberation",
    "llm",
    "claude",
    "gpt",
    "consensus",
    "enterprise",
    "decision-assurance",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

dependencies = [
    "aiohttp>=3.13.3,<4.0",  # CVE fixes in 3.13.3
    "websockets>=13.0,<15.1",  # google-genai 1.59 requires >=13.0,<15.1
    "pyyaml>=6.0,<7.0",
    "pydantic>=2.0,<3.0",
    "pydantic-settings>=2.0,<3.0",
    "bcrypt>=4.0,<6.0",  # Secure password hashing (5.0 adds Argon2 support)
    "cryptography>=46.0,<48.0",  # AES-256-GCM encryption for secrets at rest (46.x for CVE fixes)
    "markupsafe>=2.1.0,<4.0",  # HTML escaping for XSS prevention
    "defusedxml>=0.7,<1.0",  # Safe XML parsing to prevent XXE attacks
    "pyotp>=2.9,<3.0",  # TOTP/HOTP for MFA
    "jinja2>=3.1.6,<4.0",  # CVE-2024-56326 fix
    "urllib3>=2.6.3,<3.0",  # CVE fix
    "httpx>=0.27,<1.0",  # Required by training/tinker_client.py
    "numpy>=2.0,<3.0",  # Required by debate/cache/embeddings_lru.py
    "watchfiles>=0.21,<2.0",  # Required by sync/watcher.py for directory watching
    "boto3>=1.34,<2.0",  # AWS Secrets Manager for production secrets
    "PyJWT>=2.8,<3.0",  # JWT verification for auth, OIDC, and chat webhooks
    "fastapi>=0.109.0,<1.0",  # Async HTTP server (FastAPI v2 API)
    "uvicorn[standard]>=0.27.0,<1.0",  # ASGI server for FastAPI
    "aragora-debate>=0.2.0,<1.0",  # Standalone debate engine (quickstart + playground)
    "python-multipart>=0.0.22",  # CVE-2026-24486 fix (transitive via fastapi/mcp)
    "mcp>=1.0,<2.0",  # Model Context Protocol server for AI tool integration
]

