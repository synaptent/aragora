[project.scripts]
aragora = "aragora.cli.main:main"
aragora-mcp = "aragora.mcp.server:main"
gauntlet = "aragora.gauntlet.__main__:main"

[project.urls]
Homepage = "https://aragora.ai"
Documentation = "https://github.com/an0mium/aragora#readme"
Repository = "https://github.com/an0mium/aragora"
Issues = "https://github.com/an0mium/aragora/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["aragora", "aragora.*"]
exclude = ["aragora-debate*"]

[tool.setuptools.package-data]
"aragora" = ["py.typed"]
"aragora.fixtures" = ["*.json"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "T201", "BLE001", "UP006", "UP007", "G004", "C4", "SIM910", "S101"]  # T201 = print, BLE001 = blind except, UP006/UP007 = modern typing, G004 = no f-string in logger, C4 = unnecessary comprehensions, SIM910 = dict.get default None, S101 = no assert in production
ignore = ["E402", "E501", "E731", "E741", "E712", "C401", "C405", "C408", "C416"]

[tool.ruff.lint.per-file-ignores]
# Allow print statements in CLI modules, migrations, and scripts
"aragora/cli/*" = ["T201", "BLE001"]
"aragora/ideacloud/cli/*" = ["T201"]
"aragora/migrations/*" = ["T201", "BLE001"]
"aragora/db/migrate.py" = ["T201", "BLE001"]
"aragora/persistence/migrations/*" = ["T201", "BLE001"]
"aragora/training/exporters/*" = ["T201", "BLE001"]
"aragora/training/tinker_client.py" = ["T201", "BLE001"]
"aragora/debate/breakpoints.py" = ["T201", "BLE001"]
"aragora/nomic/gates.py" = ["T201", "BLE001"]
"aragora/nomic/approval.py" = ["T201", "BLE001"]
"aragora/nomic/scope_guard.py" = ["T201", "BLE001"]
"aragora/server/__main__.py" = ["T201", "BLE001"]
"aragora/server/startup/health_check.py" = ["T201", "BLE001"]
"scripts/*" = ["T201", "F401", "F841", "BLE001", "G004", "S101"]
"tests/*" = ["T201", "F401", "F821", "F841", "BLE001", "G004", "S101"]  # F821: SSO tests need refactor
"aragora/**/test_*.py" = ["S101"]  # Allow assert in test files nested inside aragora/
"aragora/**/tests/*" = ["S101"]  # Allow assert in test directories nested inside aragora/
"examples/*" = ["T201", "BLE001"]
"sdk/cookbook/*" = ["T201", "BLE001", "F841"]
"deprecated/*" = ["UP"]  # Deprecated code, don't modernize
# BLE001: Now enforced on new code - Phase 12 (Feb 2026)
# Only exempted in specific modules above (cli, migrations, scripts, tests)
# G004: Ignore f-string in logger calls for existing code (11,271 violations, ruff cannot auto-fix)
# New code should use lazy % formatting: logger.info("msg %s", var) instead of logger.info(f"msg {var}")
# BLE001: Ignore bare exception handlers in all modules (to be fixed incrementally)
# 2307+ existing violations documented - scheduled for Phase 30 migration
# G004: Ignore f-string in logger calls for existing code (11,271 violations, ruff cannot auto-fix)
# New code should use lazy % formatting: logger.info("msg %s", var) instead of logger.info(f"msg {var}")
# C4: 2000+ existing unnecessary comprehension violations - fix incrementally
# SIM910: 48 existing dict.get(key, None) → dict.get(key) violations
"aragora/*" = ["BLE001", "G004", "C4", "SIM910"]
# Legacy modules with explicit BLE001 tracking (subset of above, for reference)
"aragora/analysis/codebase/bug_detector.py" = ["BLE001", "G004"]
"aragora/agents/code_reviewer.py" = ["BLE001", "G004"]
