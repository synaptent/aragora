dev = [
    "pytest>=7.0,<10.0",
    "pytest-asyncio>=0.21,<2.0",
    "pytest-benchmark>=4.0,<6.0",
    "pytest-cov>=4.0,<8.0",
    "pytest-timeout>=2.0,<3.0",
    "pytest-xdist>=3.5,<4.0",  # Parallel test execution
    "pytest-rerunfailures>=14.0,<15.0",  # Rerun flaky tests
    "pytest-randomly>=3.15,<5.0",  # Randomize test order to detect pollution
    "black>=23.0,<27.0",
    "ruff>=0.1,<1.0",
    "bandit>=1.7,<2.0",
    "mypy>=1.8,<2.0",
    "mutmut>=3.0,<4.0",
