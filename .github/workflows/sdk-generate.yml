name: Generate SDK Types

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'sdk/typescript/src/**/*.ts'
      - 'sdk/typescript/package.json'
      - 'sdk/typescript/tsconfig.json'
  schedule:
    # Nightly at 1:15 UTC
    - cron: '15 1 * * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate even if no changes'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: sdk-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-typescript-types:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: aragora
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install datamodel-code-generator pyyaml

      - name: Generate OpenAPI spec (if needed)
        run: |
          if [ ! -f docs/api/openapi.json ]; then
            pip install -e .
            python scripts/generate_openapi.py --output docs/api/openapi.json
          fi

      - name: Generate TypeScript types
        run: |
          python scripts/generate_typescript_sdk.py \
            --openapi docs/api/openapi.json \
            --output sdk/typescript/src/generated-types.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet sdk/typescript/src/generated-types.ts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR with changes
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(sdk): regenerate TypeScript types from OpenAPI spec

            Auto-generated by SDK generation workflow.
          branch: chore/sdk-types-auto
          title: "chore(sdk): regenerate TypeScript types"
          body: "Auto-generated TypeScript types from OpenAPI spec."
          add-paths: sdk/typescript/src/generated-types.ts
          delete-branch: true

      - name: Upload generated types as artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-types
          path: sdk/typescript/src/generated-types.ts
          retention-days: 7

  validate-typescript:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    needs: generate-typescript-types
    runs-on: aragora
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Download generated types
        uses: actions/download-artifact@v4
        with:
          name: typescript-types
          path: sdk/typescript/src/

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Type check
        working-directory: sdk/typescript
        run: npm run typecheck || npx tsc --noEmit

      - name: Build
        working-directory: sdk/typescript
        run: npm run build

  # Standalone validation for direct SDK source changes (no generation needed)
  validate-sdk-source:
    if: |
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      (github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.modified, 'docs/api/openapi')))
    runs-on: aragora
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Type check
        working-directory: sdk/typescript
        run: npm run typecheck || npx tsc --noEmit

      - name: Lint
        working-directory: sdk/typescript
        run: npm run lint --if-present

      - name: Build
        working-directory: sdk/typescript
        run: npm run build
