name: Branch Discipline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  enforce-main-pr-policy:
    if: github.event_name == 'push'
    runs-on: aragora
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Verify commits are associated with pull requests
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const headCommit = context.payload.head_commit || null;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const bypassTag = "[allow-direct-main]";
            const violations = [];
            const mergePayloadAllowlist = new Set();
            const titlePatterns = [
              /\(#(\d+)\)\s*$/,
              /^Merge pull request #(\d+)\b/,
            ];

            if (commits.length === 0) {
              core.info("No commits in payload; skipping direct-push check.");
              return;
            }

            async function isVerifiedPullMerge(prNumber, commitSha) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                return Boolean(
                  pr &&
                    pr.merged_at &&
                    pr.base &&
                    pr.base.ref === "main" &&
                    (pr.merge_commit_sha || "").trim() === commitSha
                );
              } catch (error) {
                core.warning(`PR lookup by number failed for #${prNumber}: ${String(error)}`);
                return false;
              }
            }

            function pullNumberFromTitle(title) {
              for (const pattern of titlePatterns) {
                const match = title.match(pattern);
                if (match) {
                  return Number(match[1]);
                }
              }
              return null;
            }

            async function getVerifiedMergedPull(prNumber, mergeCommitSha) {
              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                if (
                  pr &&
                  pr.merged_at &&
                  pr.base &&
                  pr.base.ref === "main" &&
                  (pr.merge_commit_sha || "").trim() === mergeCommitSha
                ) {
                  return pr;
                }
              } catch (error) {
                core.warning(`PR lookup by number failed for #${prNumber}: ${String(error)}`);
              }
              return null;
            }

            async function primeMergePayloadAllowlist() {
              if (!headCommit) {
                return;
              }
              const headTitle = (headCommit.message || "").split("\n")[0];
              const prNumber = pullNumberFromTitle(headTitle);
              if (!prNumber) {
                return;
              }
              const pr = await getVerifiedMergedPull(prNumber, headCommit.id);
              if (!pr) {
                return;
              }
              mergePayloadAllowlist.add((pr.merge_commit_sha || "").trim());
              mergePayloadAllowlist.add((pr.head?.sha || "").trim());
              const prCommits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              for (const prCommit of prCommits) {
                if (prCommit?.sha) {
                  mergePayloadAllowlist.add(prCommit.sha.trim());
                }
              }
              mergePayloadAllowlist.delete("");
              core.info(
                `Allowing ${mergePayloadAllowlist.size} commit(s) from verified merged PR #${pr.number} in push payload.`
              );
            }

            async function hasAssociatedMainPull(commitSha) {
              const resp = await github.request(
                "GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls",
                {
                  owner,
                  repo,
                  commit_sha: commitSha,
                  mediaType: { previews: ["groot"] },
                }
              );
              const prs = Array.isArray(resp.data) ? resp.data : [];
              return prs.some((pr) => {
                const baseRef = pr?.base?.ref || "";
                return baseRef === "main" && Boolean(pr?.merged_at);
              });
            }

            await primeMergePayloadAllowlist();

            for (const commit of commits) {
              const title = (commit.message || "").split("\n")[0];
              if ((commit.message || "").includes(bypassTag)) {
                core.warning(`Bypass tag present for ${commit.id.slice(0, 7)}: ${title}`);
                continue;
              }

              if (mergePayloadAllowlist.has((commit.id || "").trim())) {
                continue;
              }

              let verifiedByTitle = false;
              const prNumber = pullNumberFromTitle(title);
              if (prNumber) {
                verifiedByTitle = await isVerifiedPullMerge(prNumber, commit.id);
              }
              if (verifiedByTitle) {
                continue;
              }

              try {
                const associated = await hasAssociatedMainPull(commit.id);
                if (!associated) {
                  violations.push(`${commit.id.slice(0, 7)} ${title}`);
                }
              } catch (error) {
                violations.push(`${commit.id.slice(0, 7)} ${title} (PR lookup failed)`);
                core.warning(`PR lookup failed for ${commit.id}: ${String(error)}`);
              }
            }

            if (violations.length > 0) {
              core.setFailed(
                "Direct push commits detected on main without associated PRs:\n" +
                  violations.join("\n") +
                  "\nUse feature branches + PR merge. Emergency override tag: [allow-direct-main]"
              );
            } else {
              core.info("All pushed commits are associated with pull requests.");
            }
