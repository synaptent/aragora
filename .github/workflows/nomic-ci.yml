name: Nomic Branch CI

on:
  push:
    branches: ['dev/**']

concurrency:
  group: nomic-ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  targeted-tests:
    runs-on: aragora
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev,test]"
          pip install pytest-timeout
      - name: Determine changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
      - name: Run targeted tests
        run: |
          python scripts/nomic_ci_test_selector.py \
            --changed-files ${{ steps.changes.outputs.files }} \
            --run
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nomic-ci-results-${{ github.sha }}
          path: .nomic-ci-result.json
          retention-days: 7
