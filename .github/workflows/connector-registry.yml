name: Connector Registry Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'aragora/connectors/**'
      - 'docs/connectors/**'
      - 'scripts/update_connector_registry.py'
      - 'aragora/connectors/registry.py'
      - '.github/workflows/connector-registry.yml'
  push:
    branches: [main]
    paths:
      - 'aragora/connectors/**'
      - 'docs/connectors/**'
      - 'scripts/update_connector_registry.py'
      - 'aragora/connectors/registry.py'
      - '.github/workflows/connector-registry.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: aragora
    steps:
      - name: Clean stale sparse-checkout
        run: |
          if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
            git sparse-checkout disable 2>/dev/null || true
            git config --unset-all extensions.worktreeConfig 2>/dev/null || true
          fi
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/checkout-integrity

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify connector registry artifacts
        run: python scripts/update_connector_registry.py --check
