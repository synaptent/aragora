name: Uptime Monitor

on:
  schedule:
    # Run every 30 minutes (reduced from 5 min to save Actions minutes)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: aragora
    timeout-minutes: 5
    env:
      LIVE_FRONTEND_BASE_URL: ${{ vars.LIVE_FRONTEND_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/verify_frontend_routes.sh
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/checkout-integrity

      - name: Check Frontend Critical Routes
        run: |
          FRONTEND_URL="${LIVE_FRONTEND_BASE_URL:-https://aragora.ai}"
          # Retry once on transient failure
          for attempt in 1 2; do
            if bash scripts/verify_frontend_routes.sh "$FRONTEND_URL"; then
              echo "Frontend routes: OK ($FRONTEND_URL)"
              exit 0
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "Frontend route check failed on attempt 1, retrying in 10s..."
              sleep 10
            fi
          done
          echo "::error::Frontend route check failed after 2 attempts"
          exit 1

      - name: Check Production API (Lightsail)
        run: |
          # Use /api/health (public, load-balancer friendly)
          response=$(curl -sf -o /dev/null -w "%{http_code}" "https://api.aragora.ai/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "::error::Production API returned $response"
            exit 1
          fi
          echo "Production API: OK ($response)"

      - name: Check Staging API (EC2)
        # Non-blocking: Staging environment may be down during maintenance without affecting production
        continue-on-error: true
        run: |
          # Use /api/health (public, load-balancer friendly)
          response=$(curl -sf -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:8080/api/health" --connect-timeout 10 || echo "000")
          if [ "$response" != "200" ]; then
            echo "::warning::Staging API returned $response (non-critical)"
          else
            echo "Staging API: OK ($response)"
          fi

      - name: Check WebSocket Endpoint
        run: |
          # Basic connectivity check for WebSocket upgrade
          response=$(curl -sf -o /dev/null -w "%{http_code}" -H "Upgrade: websocket" -H "Connection: Upgrade" "https://api.aragora.ai/ws" || echo "000")
          # WebSocket endpoints typically return 101 or 400 for non-upgrade requests
          if [ "$response" = "000" ]; then
            echo "::error::WebSocket endpoint unreachable"
            exit 1
          fi
          echo "WebSocket endpoint reachable ($response)"

      - name: Summary
        if: always()
        run: |
          echo "## Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel/custom domain) | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production API | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u) |" >> $GITHUB_STEP_SUMMARY

  notify-on-failure:
    needs: health-check
    if: failure()
    runs-on: aragora
    timeout-minutes: 5
    permissions:
      issues: write

    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Service Outage Detected - ${new Date().toISOString()}`;
            const body = `
            ## Automated Health Check Failed

            One or more services are not responding correctly.

            **Time**: ${new Date().toISOString()}
            **Workflow Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            ### Services to Check
            - [ ] Frontend: https://aragora.ai
            - [ ] Production API: https://api.aragora.ai/api/health
            - [ ] Lightsail instance status

            ### Quick Commands
            \`\`\`bash
            # Check Lightsail
            ssh -i ~/.ssh/lightsail-aragora.pem ubuntu@3.17.253.61 "sudo systemctl status aragora cloudflared"

            # Restart services
            ssh -i ~/.ssh/lightsail-aragora.pem ubuntu@3.17.253.61 "sudo systemctl restart aragora cloudflared"
            \`\`\`
            `;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'outage'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['outage', 'automated']
              });
            }
