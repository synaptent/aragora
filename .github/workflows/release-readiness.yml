name: Release Readiness Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "aragora/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "scripts/ci_release_readiness.sh"
      - "scripts/check_branch_mutation_policy.py"
      - "scripts/check_deploy_secure_sha_guard.py"
      - "scripts/check_required_check_priority_policy.py"
      - "scripts/check_execution_gate_defaults.py"
      - "scripts/check_prometheus_rules.py"
      - ".github/workflows/release-readiness.yml"
  schedule:
    # Nightly at 1:35 UTC
    - cron: '35 1 * * *'
  workflow_dispatch:

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Release Readiness
    runs-on: aragora
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run release-readiness gate
        # Keep this gate deterministic: never rely on optional external
        # integration env vars inherited from org/repo secrets.
        env:
          REDIS_URL: ""
          CACHE_REDIS_URL: ""
          ARAGORA_REDIS_URL: ""
          GOOGLE_CHAT_CREDENTIALS: ""
          GOOGLE_CHAT_PROJECT_ID: ""
        run: bash scripts/ci_release_readiness.sh
