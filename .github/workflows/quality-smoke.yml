name: Quality Pipeline Smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  schedule:
    # Nightly at 1:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:

concurrency:
  group: quality-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: aragora
    timeout-minutes: 3
    outputs:
      quality: ${{ steps.filter.outputs.quality }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            quality:
              - 'aragora/debate/output_quality.py'
              - 'aragora/debate/repo_grounding.py'
              - 'aragora/cli/commands/debate.py'
              - 'tests/debate/test_output_quality.py'
              - 'tests/debate/test_repo_grounding.py'
              - 'tests/cli/test_offline_golden_path.py'
              - '.github/workflows/quality-smoke.yml'

  quality-smoke-run:
    needs: changes
    if: needs.changes.outputs.quality == 'true' && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    name: Quality Pipeline Tests
    runs-on: aragora
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run output quality tests
        run: |
          pytest tests/debate/test_output_quality.py -v --timeout=60 --tb=short
        env:
          PYTHONPATH: .

      - name: Run repo grounding tests
        run: |
          pytest tests/debate/test_repo_grounding.py -v --timeout=60 --tb=short
        env:
          PYTHONPATH: .

      - name: Run offline golden path tests
        run: |
          pytest tests/cli/test_offline_golden_path.py -v --timeout=60 --tb=short \
            -W error::ResourceWarning \
            -W error::pytest.PytestUnraisableExceptionWarning
        env:
          PYTHONPATH: .
          PYTHONWARNINGS: "error::ResourceWarning"

      - name: Quality smoke summary
        if: always()
        run: |
          echo "## Quality Pipeline Smoke Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates post-consensus quality pipeline WITHOUT real API calls:" >> $GITHUB_STEP_SUMMARY
          echo "- \`test_output_quality.py\` — output formatting and quality checks" >> $GITHUB_STEP_SUMMARY
          echo "- \`test_repo_grounding.py\` — repository grounding pipeline" >> $GITHUB_STEP_SUMMARY
          echo "- \`test_offline_golden_path.py\` — end-to-end offline debate flow" >> $GITHUB_STEP_SUMMARY

  quality-smoke:
    needs: [changes, quality-smoke-run]
    if: always()
    runs-on: aragora
    timeout-minutes: 2
    steps:
      - name: Evaluate quality smoke result
        run: |
          if [[ "${{ needs.quality-smoke-run.result }}" == "failure" ]]; then
            echo "::error::Quality pipeline smoke tests failed"
            exit 1
          fi
          echo "Quality pipeline smoke passed (or skipped — no relevant changes)"
