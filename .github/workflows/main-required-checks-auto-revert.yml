name: Main Required Checks Auto Revert

on:
  workflow_run:
    workflows:
      - Lint
      - SDK Parity Check
      - OpenAPI Spec
      - SDK Tests
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to evaluate (defaults to latest main)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report action without reverting/pushing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  checks: read

concurrency:
  group: main-required-auto-revert-${{ github.event.workflow_run.head_sha || github.event.inputs.sha || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-revert:
    name: Auto Revert Failed Required Checks
    runs-on: aragora
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]] || [[ ! -f scripts/auto_revert_main_required_failures.py ]]; then
            echo "::error::Repository checkout is incomplete (missing pyproject.toml or scripts/auto_revert_main_required_failures.py)"
            echo "PWD=$(pwd)"
            ls -la
            ls -la scripts || true
            exit 1
          fi

      - name: Evaluate and revert failed required checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          TARGET_SHA="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sha || github.event.workflow_run.head_sha }}"
          EXTRA_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi

          python3 scripts/auto_revert_main_required_failures.py \
            --repo "${GITHUB_REPOSITORY}" \
            --base "main" \
            --repo-path "${GITHUB_WORKSPACE}" \
            --sha "${TARGET_SHA}" \
            ${EXTRA_ARGS}
