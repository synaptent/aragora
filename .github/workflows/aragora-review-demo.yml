name: Aragora Code Review (Demo)

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: aragora-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Clean stale sparse-checkout
        run: |
          if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
            git sparse-checkout disable 2>/dev/null || true
            git config --unset-all extensions.worktreeConfig 2>/dev/null || true
          fi
        shell: bash

      - uses: actions/checkout@v4

      - uses: synaptent/aragora/.github/actions/checkout-integrity

      - name: Aragora Multi-Agent Code Review
        uses: ./.github/actions/aragora-code-review
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          rounds: 2
          focus: security,performance,quality
          output-format: github
          post-comment: true
