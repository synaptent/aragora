name: Core Suites (Decision Integrity)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'aragora/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'scripts/ci_core_suites.sh'
      - 'scripts/ci_install_project.sh'
      - '.github/workflows/core-suites.yml'
  schedule:
    # Nightly at 2:50 UTC
    - cron: '50 2 * * *'
  workflow_dispatch:

concurrency:
  group: core-suites-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  core-suites:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Core Suites
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.11"

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          bash scripts/ci_install_project.sh --extras dev

      - name: Run core suites
        run: bash scripts/ci_core_suites.sh

  security-boundaries:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Security Boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.11"

      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          bash scripts/ci_install_project.sh --extras dev

      - name: Run OpenClaw + auth/RBAC security boundary suites
        run: |
          pytest -q \
            tests/compat/openclaw/test_standalone.py \
            tests/server/handlers/test_openclaw_persistent_store.py \
            tests/rbac/test_middleware.py \
            tests/rbac/test_handler_enforcement.py \
            tests/handlers/test_oauth.py \
            tests/middleware/test_user_auth.py \
            tests/test_handlers_memory.py
