name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: aragora
    defaults:
      run:
        working-directory: docs-site

    steps:
      - name: Clean stale sparse-checkout
        run: |
          if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
            git sparse-checkout disable 2>/dev/null || true
            git config --unset-all extensions.worktreeConfig 2>/dev/null || true
          fi
        shell: bash

      - uses: actions/checkout@v4

      - uses: ./.github/actions/checkout-integrity

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync documentation
        run: node scripts/sync-docs.js

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: aragora
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
