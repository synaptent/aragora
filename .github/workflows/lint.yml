      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: aragora/live/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        # Phase 12: ESLint now blocking (was continue-on-error: true)

      - name: Check API types are in sync
        continue-on-error: true  # Types are generated from spec; drift is expected during rapid development
        run: npm run check:types

