name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'aragora/**'
      - 'tests/**'
      - 'scripts/**'
      - 'AGENTS.md'
      - 'pyproject.toml'
      - '.github/workflows/**'
      - 'deploy/**'
      - 'security/policies/**'
      - 'aragora-operator/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: aragora
    timeout-minutes: 3
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'aragora/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '.github/workflows/**'
              - 'deploy/**'
              - 'security/policies/**'
              - 'aragora-operator/**'

  lint-run:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: aragora
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Resolve Python runtime
        id: lint_python
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=""
          for candidate in python3.13 python3.12 python3.11 python3.10 python3 python; do
            if command -v "$candidate" >/dev/null 2>&1; then
              PYTHON_BIN="$(command -v "$candidate")"
              break
            fi
          done
          if [[ -z "$PYTHON_BIN" ]]; then
            echo "::error::Python runtime not found on runner"
            exit 1
          fi
          PYTHON_VERSION="$("$PYTHON_BIN" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
          if ! "$PYTHON_BIN" -c 'import sys; raise SystemExit(0 if sys.version_info >= (3, 10) else 1)'; then
            echo "::error::Python >=3.10 required for lint checks, found ${PYTHON_VERSION} at ${PYTHON_BIN}"
            exit 1
          fi
          echo "Using Python ${PYTHON_VERSION} at ${PYTHON_BIN}"
          "$PYTHON_BIN" -m ensurepip --upgrade || true
          "$PYTHON_BIN" -m pip install --upgrade pip
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "python_bin=$PYTHON_BIN" >> "$GITHUB_OUTPUT"

      - name: Install linters
        run: |
          "${{ steps.lint_python.outputs.python_bin }}" -m pip install --user ruff==0.14.14
          "${{ steps.lint_python.outputs.python_bin }}" -m pip install --user -e .

      - name: Enforce branch mutation policy
        run: ${{ steps.lint_python.outputs.python_bin }} scripts/check_branch_mutation_policy.py

      - name: Enforce deploy SHA verification guard
        run: ${{ steps.lint_python.outputs.python_bin }} scripts/check_deploy_secure_sha_guard.py

      - name: Enforce required-check-priority keep-list policy
        run: ${{ steps.lint_python.outputs.python_bin }} scripts/check_required_check_priority_policy.py

      - name: Enforce execution-gate default hardening policy
        run: ${{ steps.lint_python.outputs.python_bin }} scripts/check_execution_gate_defaults.py

      - name: Enforce execution-gate policy change-control metadata
        run: ${{ steps.lint_python.outputs.python_bin }} scripts/check_execution_gate_policy_control.py

      - name: Validate Prometheus rule syntax with promtool
        run: ${{ steps.lint_python.outputs.python_bin }} scripts/check_prometheus_rules.py

      - name: Run ruff format check (all Python files)
        run: ${{ steps.lint_python.outputs.python_bin }} -m ruff format --check aragora/ tests/ scripts/
        shell: bash

      - name: Run ruff lint check (all Python files)
        run: ${{ steps.lint_python.outputs.python_bin }} -m ruff check aragora/ tests/ scripts/
        shell: bash

  lint:
    needs: [changes, lint-run]
    if: always()
    runs-on: aragora
    timeout-minutes: 2
    steps:
      - name: Evaluate lint result
        run: |
          if [[ "${{ needs.lint-run.result }}" == "failure" ]]; then
            echo "::error::Lint checks failed"
            exit 1
          fi
          echo "Lint passed (or skipped — no Python-relevant changes)"

  connector-exception-hygiene:
    runs-on: aragora
    timeout-minutes: 10
    name: Connector Exception Hygiene
    # PR fast path: this job is non-required and runs on push/workflow_dispatch.
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run connector/runtime exception guard
        run: python scripts/check_connector_exception_handling.py --path aragora/connectors aragora/runtime

      - name: Connector guard repro hint
        if: failure()
        run: |
          echo "Reproduce locally: python scripts/check_connector_exception_handling.py --path aragora/connectors aragora/runtime"

  agent-registry-sync:
    runs-on: aragora
    timeout-minutes: 10
    name: Agent Registry Sync
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check AGENTS registry sync
        run: python scripts/check_agent_registry_sync.py

      - name: Check doc agent-count drift
        run: python scripts/check_agent_registry_drift.py

      - name: Agent registry repro hint
        if: failure()
        run: |
          echo "Reproduce locally:"
          echo "  python scripts/check_agent_registry_sync.py"
          echo "  python scripts/check_agent_registry_drift.py"

  typecheck-run:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: aragora
    timeout-minutes: 15

    steps:
