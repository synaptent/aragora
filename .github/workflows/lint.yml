      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          # Generate JSON report for artifacts
          bandit -r aragora/ -ll -ii --format json --output bandit-report.json || true
          # Fail on HIGH severity only (-lll = high, -ll = medium, -l = low)
          bandit -r aragora/ -lll -ii

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -e .
          # Blocking: fail on HIGH/CRITICAL vulnerabilities.
          # --ignore 70612: Known false positive / accepted risk.
          safety check --full-report --ignore 70612

  secrets:
    runs-on: aragora
    timeout-minutes: 10
    name: Secret Scanning
    if: github.event_name != 'pull_request'
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
