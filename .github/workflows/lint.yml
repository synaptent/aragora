            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Skip Gitleaks when license is missing
        if: env.GITLEAKS_LICENSE == ''
        run: |
          echo "::warning::GITLEAKS_LICENSE is not configured; skipping gitleaks action."

      - name: Run Gitleaks
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}

  helm-lint:
    runs-on: aragora
    timeout-minutes: 10
    name: Helm Chart Validation
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
