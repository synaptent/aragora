name: Developer Onramp Integration

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/quickstart.md"
      - "examples/quickstart.*"
      - "aragora/live/src/app/**/playground/**"
      - "aragora/live/src/app/**/docs/**"
      - "sdk/**"

jobs:
  time-to-first-debate:
    runs-on: aragora
    timeout-minutes: 10
    steps:
      - name: Clean stale sparse-checkout
        run: |
          if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
            git sparse-checkout disable 2>/dev/null || true
            git config --unset-all extensions.worktreeConfig 2>/dev/null || true
          fi
        shell: bash

      - uses: actions/checkout@v4
      - uses: ./.github/actions/checkout-integrity
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and run quickstart
        run: |
          pip install -e .
          timeout 300 python examples/quickstart.py
        env:
          ARAGORA_OFFLINE: "1"

  playground-build:
    runs-on: aragora
    timeout-minutes: 10
    steps:
      - name: Clean stale sparse-checkout
        run: |
          if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
            git sparse-checkout disable 2>/dev/null || true
            git config --unset-all extensions.worktreeConfig 2>/dev/null || true
          fi
        shell: bash

      - uses: actions/checkout@v4
      - uses: ./.github/actions/checkout-integrity
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend with playground
        working-directory: aragora/live
        run: |
          npm ci
          npx next build --webpack

  sdk-parity:
    runs-on: aragora
    timeout-minutes: 5
    steps:
      - name: Clean stale sparse-checkout
        run: |
          if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
            git sparse-checkout disable 2>/dev/null || true
            git config --unset-all extensions.worktreeConfig 2>/dev/null || true
          fi
        shell: bash

      - uses: actions/checkout@v4
      - uses: ./.github/actions/checkout-integrity
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check SDK parity
        run: python scripts/sdk_parity_check.py
