name: Developer Onramp Integration

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  time-to-first-debate:
    runs-on: aragora
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and run quickstart
        run: |
          pip install -e .
          timeout 300 python examples/quickstart.py
        env:
          ARAGORA_OFFLINE: "1"

  playground-build:
    runs-on: aragora
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend with playground
        working-directory: aragora/live
        run: |
          npm ci
          npx next build --webpack

  sdk-parity:
    runs-on: aragora
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check SDK parity
        run: python scripts/sdk_parity_check.py
