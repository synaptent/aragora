name: Publish aragora to PyPI

# Publishes the main `aragora` package from the repo root.
# Manual dispatch only to prevent accidental publishes.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 2.7.0)'
        required: true
        type: string
      confirm:
        description: 'Type PUBLISH to confirm'
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # Required for PyPI trusted publishing

jobs:
  test:
    runs-on: aragora
    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Setup Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run smoke tests
        run: make test-smoke

  publish:
    needs: test
    runs-on: aragora
    if: github.event.inputs.confirm == 'PUBLISH'
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Setup Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Update version
        run: |
          sed -i 's/version = "[^"]*"/version = "${{ github.event.inputs.version }}"/' pyproject.toml
          echo "Set version to ${{ github.event.inputs.version }}"
          grep 'version' pyproject.toml | head -1

      - name: Build package
        run: python -m build

      - name: Verify no contamination
        run: |
          python -c "
          import zipfile, glob, sys
          whl = sorted(glob.glob('dist/aragora-*.whl'))[-1]
          z = zipfile.ZipFile(whl)
          bad = [n for n in z.namelist() if 'aragora_debate' in n or 'aragora_py' in n or 'aragora_sdk' in n]
          if bad:
              print(f'CONTAMINATION DETECTED: {bad}')
              sys.exit(1)
          print(f'Clean: {len(z.namelist())} files, no contamination')
          "

      - name: Check with twine
        run: twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          attestations: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: aragora v${{ github.event.inputs.version }}
          body: |
            ## aragora v${{ github.event.inputs.version }}

            The Decision Integrity Platform — orchestrate 42+ agent types to adversarially vet decisions.

            ```bash
            pip install aragora==${{ github.event.inputs.version }}
            ```

            See [documentation](https://docs.aragora.ai) for usage.
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'rc') }}
