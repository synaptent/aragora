name: Aragora PR Review

# Non-blocking by policy:
# - Pull-request events run in advisory mode only and must never gate merges.
# - Full AI review remains available via manual workflow_dispatch.

on:

concurrency:
  group: pr-debate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: aragora
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Resolve PR number
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Advisory mode (non-blocking)
        if: github.event_name == 'pull_request_target'
        shell: bash
        run: |
          echo "PR #${{ steps.resolve.outputs.pr_number }}: advisory-only review mode."
          echo "This workflow does not block agent pushes or merges."
          echo "Run workflow_dispatch for a full AI review on demand."

      # Full review path (manual only)
      # SECURITY: checkout base-branch code only; never execute PR head with secrets.
      - name: Checkout base branch (trusted code only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi
        if: github.event_name == 'workflow_dispatch'

      - name: Setup Python
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Ensure GitHub CLI is available
        if: github.event_name == 'workflow_dispatch'
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh --version | head -1
            exit 0
          fi
          echo "::warning::gh CLI missing on runner; installing fallback package"
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          else
            apt-get update
            apt-get install -y gh
          fi
          gh --version | head -1

      - name: Install aragora from base branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Get PR diff
        if: github.event_name == 'workflow_dispatch'
        id: diff
        run: |
          gh pr diff "${{ steps.resolve.outputs.pr_number }}" > pr.diff
          DIFF_SIZE=$(wc -c < pr.diff)
          echo "Diff size: $DIFF_SIZE bytes"

          if [ "$DIFF_SIZE" -gt 50000 ]; then
            echo "Diff exceeds 50KB, applying truncation..."
            head -c 50000 pr.diff > pr_truncated.diff
            echo -e "\n\n[... diff truncated to 50KB for review ...]" >> pr_truncated.diff
            mv pr_truncated.diff pr.diff
          fi

          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create artifacts directory
        if: github.event_name == 'workflow_dispatch'
        run: mkdir -p ./artifacts

      - name: Run aragora review
        if: github.event_name == 'workflow_dispatch'
        id: review_run
        run: |
          aragora review \
            --diff-file pr.diff \
            --output-format github \
            --output-dir ./artifacts \
            --agents anthropic-api,openai-api \
            --rounds 2 \
            --focus security,performance,quality \
            > ./artifacts/comment.md 2> ./artifacts/review.log || true

          if [ -f "./artifacts/comment.md" ] && [ -s "./artifacts/comment.md" ]; then
            echo "review_generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "review_generated=false" >> "$GITHUB_OUTPUT"
            cat > ./artifacts/comment.md << 'FALLBACK'
          ## AI Red Team Code Review

          Review could not be completed. Please check the workflow logs.
          FALLBACK
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: aragora-review-${{ steps.resolve.outputs.pr_number }}
          path: ./artifacts/
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'workflow_dispatch'
        run: gh pr comment "${{ steps.resolve.outputs.pr_number }}" --body-file ./artifacts/comment.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Add review label
        if: github.event_name == 'workflow_dispatch' && steps.review_run.outputs.review_generated == 'true'
        run: gh pr edit "${{ steps.resolve.outputs.pr_number }}" --add-label "ai-reviewed" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
