name: SDK Parity Check

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sdk-parity-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: aragora
    timeout-minutes: 3
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'aragora/server/handlers/**'
              - 'aragora/server/unified_server.py'
              - 'sdk/**'
              - 'openapi/**'
              - 'scripts/sdk_parity*'
              - 'scripts/check_sdk_parity*'
              - 'scripts/check_version_alignment*'
              - '.github/workflows/sdk-parity.yml'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - 'package.json'

  sdk-parity-run:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: aragora
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Resolve Python runtime
        id: sdk_parity_python
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=""
          for candidate in python3.13 python3.12 python3.11 python3.10 python3 python; do
            if command -v "$candidate" >/dev/null 2>&1; then
              PYTHON_BIN="$(command -v "$candidate")"
              break
            fi
          done
          if [[ -z "$PYTHON_BIN" ]]; then
            echo "::error::Python runtime not found on runner"
            exit 1
          fi
          PYTHON_VERSION="$("$PYTHON_BIN" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
          if ! "$PYTHON_BIN" -c 'import sys; raise SystemExit(0 if sys.version_info >= (3, 10) else 1)'; then
            echo "::error::Python >=3.10 required for sdk-parity, found ${PYTHON_VERSION} at ${PYTHON_BIN}"
            exit 1
          fi
          echo "Using Python ${PYTHON_VERSION} at ${PYTHON_BIN}"
          "$PYTHON_BIN" -m ensurepip --upgrade || true
          "$PYTHON_BIN" -m pip install --upgrade pip
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "python_bin=$PYTHON_BIN" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          "${{ steps.sdk_parity_python.outputs.python_bin }}" -m pip install --user -e .

      - name: Check Version Alignment
        run: ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_version_alignment.py

      - name: Check SDK Parity
        run: |
          # Blocking gate: fail on any drift regression beyond tracked baseline
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_sdk_parity.py \
            --strict \
            --baseline scripts/baselines/check_sdk_parity.json \
            --budget scripts/baselines/check_sdk_parity_budget.json

      - name: Check Namespace SDK Parity
        run: |
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_sdk_namespace_parity.py --strict --baseline scripts/baselines/check_sdk_namespace_parity.json

      - name: Check Cross-Language SDK Parity
        run: |
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_cross_sdk_parity.py \
            --strict \
            --baseline scripts/baselines/cross_sdk_parity.json

      - name: Generate JSON Report
        if: always()
        run: |
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_sdk_parity.py --json > parity-report.json || true
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_sdk_namespace_parity.py --json > namespace-parity-report.json || true
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/check_cross_sdk_parity.py --json > cross-sdk-parity-report.json || true
          ${{ steps.sdk_parity_python.outputs.python_bin }} scripts/contract_drift_report.py --json-out contract-drift-summary.json --md-out contract-drift-summary.md || true

      - name: Upload Parity Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-parity-report
          path: |
            parity-report.json
            namespace-parity-report.json
            cross-sdk-parity-report.json
            contract-drift-summary.json
            contract-drift-summary.md
          retention-days: 30

  sdk-parity:
    needs: [changes, sdk-parity-run]
    if: always()
    runs-on: aragora
    timeout-minutes: 2
    steps:
      - name: Evaluate sdk-parity result
        run: |
          if [[ "${{ needs.sdk-parity-run.result }}" == "failure" ]]; then
            echo "::error::SDK parity check failed"
            exit 1
          fi
          echo "SDK parity passed (or skipped — no relevant changes)"
