name: E2E Tests

on:
  schedule:
    # Nightly smoke tests at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  # Use run_id for push events so rapid pushes don't cancel running E2E suites.
  # PRs still share a group per branch (latest PR push cancels stale ones).
  group: e2e-${{ github.event_name == 'push' && github.run_id || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  e2e:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aragora/live/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,test]"

      - name: Start Aragora backend
        run: |
          # Create nomic directory for storage
          mkdir -p .nomic

          # Start server with explicit data directory
          # Use default ws-port 8765 to avoid conflict with control plane port 8766
          aragora serve --api-port 8080 --ws-port 8765 --host 127.0.0.1 > /tmp/aragora-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to be healthy using lightweight endpoint
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "Backend server is healthy"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            # Show recent log output for debugging
            if [ $i -eq 30 ] || [ $i -eq 45 ]; then
              echo "=== Recent server logs ==="
              tail -20 /tmp/aragora-server.log 2>/dev/null || true
              echo "=========================="
            fi
            sleep 2
          done

          # Final health check with detailed output
          if ! curl -fsS http://127.0.0.1:8080/healthz; then
            echo "Server failed to become healthy. Full logs:"
            cat /tmp/aragora-server.log
            exit 1
          fi
        env:
          ARAGORA_REDIS_URL: redis://localhost:6379/0
          ARAGORA_DATA_DIR: .nomic

      - name: Install frontend dependencies
        working-directory: aragora/live
        run: npm ci

      - name: Install Playwright browsers
        working-directory: aragora/live
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: aragora/live
        run: npm run build:local
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8765

      - name: Start frontend server
        working-directory: aragora/live
        run: |
          npm run start -- -p 3000 &
          FRONTEND_PID=$!
          echo "FRONTEND_PID=$FRONTEND_PID" >> $GITHUB_ENV

          # Wait for frontend to be ready (increased timeout for CI)
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: aragora/live
        run: npx playwright test e2e/auth-callback-reliability.spec.ts --project=chromium --reporter=list
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8080
          WS_URL: ws://localhost:8765

      - name: Run Playwright tests
        working-directory: aragora/live
        run: npx playwright test --reporter=html
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8080
          WS_URL: ws://localhost:8765

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: aragora/live/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: aragora/live/test-results/
          retention-days: 14

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: server-logs
          path: /tmp/aragora-server.log
          retention-days: 7

      - name: Stop servers
        if: always()
        run: |
          [ -n "$SERVER_PID" ] && kill $SERVER_PID || true
          [ -n "$FRONTEND_PID" ] && kill $FRONTEND_PID || true

  python-e2e:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Python E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest pytest-asyncio pytest-timeout aiohttp

      - name: Run Python E2E tests
        run: |
          pytest tests/e2e/ -v --tb=short --timeout=120
        env:
          REDIS_URL: redis://localhost:6379
          ARAGORA_CI: "true"
          PYTHONUNBUFFERED: "1"

      - name: Upload E2E test logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: python-e2e-logs
          path: |
            /tmp/*.log
            tests/e2e/*.log
          retention-days: 7

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: e2e
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && (github.event_name == 'pull_request')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aragora/live/package-lock.json

      - name: Install dependencies
        working-directory: aragora/live
        run: npm ci

      - name: Install Playwright
        working-directory: aragora/live
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        working-directory: aragora/live
        run: |
          # Run visual tests if they exist
          if [ -f "e2e/visual.spec.ts" ]; then
            npx playwright test e2e/visual.spec.ts --update-snapshots
          else
            echo "No visual regression tests found, skipping"
          fi
        # Non-blocking: Visual regression tests are informational and may not exist yet
        continue-on-error: true

      - name: Upload visual snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: aragora/live/e2e/__screenshots__/
          retention-days: 30
