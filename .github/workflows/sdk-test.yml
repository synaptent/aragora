name: SDK Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  schedule:
    # Nightly at 2:20 UTC
    - cron: '20 2 * * *'
  workflow_dispatch:

concurrency:
  group: sdk-test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: aragora
    timeout-minutes: 5
    name: SDK Change Detection
    outputs:
      run_python: ${{ steps.filter.outputs.python_sdk }}
      run_typescript: ${{ steps.filter.outputs.typescript_sdk }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Detect SDK relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python_sdk:
              - 'sdk/python/**'
              - 'tests/sdk/**'
            typescript_sdk:
              - 'sdk/typescript/**'
              - 'openapi/**'
              - 'package.json'
              - 'package-lock.json'

  python-sdk:
    needs: changes
    if: needs.changes.outputs.run_python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: aragora
    timeout-minutes: 10
    name: Python SDK Tests

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd sdk/python && python -m pip install -e ".[dev]"

      - name: Run SDK tests
        run: |
          cd sdk/python && python -m pytest tests/ -v --tb=short

      - name: Run SDK lint
        run: |
          cd sdk/python && python -m ruff check aragora_sdk/ tests/

  typescript-sdk-run:
    needs: changes
    if: needs.changes.outputs.run_typescript == 'true'
    runs-on: aragora
    timeout-minutes: 10
    name: TypeScript SDK Build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Type check
        working-directory: sdk/typescript
        run: npx tsc --noEmit

      - name: Verify exports
        working-directory: sdk/typescript
        run: |
          node -e "const sdk = require('./dist/index.js'); console.log('Exports:', Object.keys(sdk).length)" 2>/dev/null || echo "Build required first"

  sdk-integration:
    needs: changes
    if: needs.changes.outputs.run_python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: aragora
    timeout-minutes: 10
    name: SDK Integration Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git reset --hard || true
            git clean -ffdx || true
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}" || true
            git checkout -f "${GITHUB_SHA:-HEAD}" || true
            if git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
              git reset --hard FETCH_HEAD
            else
              git reset --hard HEAD
            fi
            git clean -ffdx || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Sparse-checkout recovery incomplete; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            if ! git archive "${GITHUB_SHA:-HEAD}" | tar -x; then
              git archive HEAD | tar -x
            fi
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e sdk/python/
          python -m pip install pytest pytest-timeout pytest-rerunfailures pytest-asyncio

      - name: Run SDK integration tests
        run: |
          python -m pytest tests/sdk/ -v --tb=short --timeout=60

  typescript-sdk:
    name: TypeScript SDK Type Check
    needs: [changes, typescript-sdk-run]
    if: always()
    runs-on: aragora
    timeout-minutes: 2
    steps:
      - name: Evaluate TypeScript SDK result
        run: |
          if [[ "${{ needs.typescript-sdk-run.result }}" == "failure" ]]; then
            echo "::error::TypeScript SDK type check failed"
            exit 1
          fi
          echo "TypeScript SDK passed (or skipped — no relevant changes)"
