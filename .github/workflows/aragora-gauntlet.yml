name: Aragora Gauntlet Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

concurrency:
  group: gauntlet-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  gauntlet:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: aragora
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify checkout integrity
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git reset --hard HEAD || true
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            git rev-parse --show-toplevel || true
            ls -la
            find . -maxdepth 3 -name pyproject.toml -print || true
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Aragora
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Check API keys
        id: keys
        run: |
          if [ -n "${ANTHROPIC_API_KEY}" ] || [ -n "${OPENAI_API_KEY}" ] || [ -n "${GEMINI_API_KEY}" ] || [ -n "${OPENROUTER_API_KEY}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Build diff input
        if: steps.keys.outputs.run == 'true'
        run: |
          git diff "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Run Gauntlet on PR diff
        if: steps.keys.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p artifacts
          aragora gauntlet /tmp/pr.diff \
            --input-type code \
            --profile code \
            --output artifacts/gauntlet_receipt.html

      - name: Upload Decision Receipt
        if: steps.keys.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gauntlet-decision-receipt
          path: artifacts/gauntlet_receipt.html

      - name: Skip (missing API keys)
        if: steps.keys.outputs.run != 'true'
        run: |
          echo "Skipping Gauntlet run: no API keys configured in secrets."
