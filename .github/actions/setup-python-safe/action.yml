name: "Setup Python (Runner-Safe)"
description: >
  Wraps actions/setup-python with automatic fallback to system Python
  for self-hosted runners that lack the Python tool cache.

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  cache:
    description: "Package manager to cache (pip, pipenv, poetry)"
    required: false
    default: ""
  cache-dependency-path:
    description: "Path to dependency file(s) for caching"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      id: setup-python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.cache || '' }}
        cache-dependency-path: ${{ inputs.cache-dependency-path || '' }}
      continue-on-error: true

    - name: Fallback to system Python
      if: steps.setup-python.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::actions/setup-python failed — falling back to system Python"
        for cmd in python${{ inputs.python-version }} python3 python; do
          if command -v "$cmd" &>/dev/null; then
            echo "Found $cmd: $("$cmd" --version)"
            sudo ln -sf "$(command -v "$cmd")" /usr/local/bin/python
            sudo ln -sf "$(command -v "$cmd")" /usr/local/bin/python3
            break
          fi
        done
        python --version || { echo "::error::No Python interpreter found"; exit 1; }
