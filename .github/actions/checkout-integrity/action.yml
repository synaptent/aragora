name: "Verify checkout integrity"
description: "Ensures checkout is complete, recovers from sparse-checkout corruption"
runs:
  using: "composite"
  steps:
    - name: Disable stale sparse-checkout
      shell: bash
      run: |
        # Self-hosted runners may retain sparse-checkout state from previous jobs.
        # Disable it unconditionally so the full worktree is visible.
        if [ -d .git ] && git rev-parse --is-inside-work-tree 2>/dev/null; then
          git sparse-checkout disable 2>/dev/null || true
          git config --unset-all extensions.worktreeConfig 2>/dev/null || true
        fi

    - name: Verify checkout integrity
      shell: bash
      run: |
        if [[ ! -f pyproject.toml ]]; then
          echo "::warning::pyproject.toml missing after checkout; attempting recovery"
          git sparse-checkout disable || true
          git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
          git reset --hard FETCH_HEAD
          git clean -ffd || true
        fi
        if [[ ! -f pyproject.toml ]]; then
          echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
          echo "PWD=$(pwd)"
          ls -la
          exit 1
        fi
