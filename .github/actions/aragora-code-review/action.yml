# .github/actions/aragora-code-review/action.yml
name: Aragora Code Review
description: Multi-agent AI code review using aragora review CLI. Requires pull-requests write permission to post comments.

inputs:
  anthropic-api-key:
    description: Anthropic API key (optional; omit to run in --demo mode)
    required: false
    default: ''
  rounds:
    description: Number of debate rounds
    required: false
    default: '2'
  focus:
    description: Comma-separated focus areas (security,performance,quality)
    required: false
    default: 'security,performance,quality'
  output-format:
    description: Output format (github, json, sarif)
    required: false
    default: 'github'
  post-comment:
    description: Post review as PR comment
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install aragora
      shell: bash
      run: pip install -e ".[dev]" --quiet 2>/dev/null || pip install aragora --quiet

    - name: Run aragora review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ github.token }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        INPUT_ROUNDS: ${{ inputs.rounds }}
        INPUT_FOCUS: ${{ inputs.focus }}
        INPUT_OUTPUT_FORMAT: ${{ inputs.output-format }}
        INPUT_POST_COMMENT: ${{ inputs.post-comment }}
        INPUT_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        if [[ -z "$PR_URL" ]]; then
          echo "::notice::No PR URL available — skipping aragora review"
          exit 0
        fi
        ARGS=("--output-format" "$INPUT_OUTPUT_FORMAT" "--rounds" "$INPUT_ROUNDS" "--focus" "$INPUT_FOCUS")
        if [[ "$INPUT_POST_COMMENT" == "true" ]]; then
          ARGS+=("--post-comment")
        fi
        if [[ -z "$INPUT_API_KEY" ]]; then
          echo "No API key provided — running in demo mode"
          ARGS+=("--demo")
        fi
        aragora review "$PR_URL" "${ARGS[@]}" || {
          EXIT=$?
          echo "::warning::aragora review exited with code $EXIT — review may be incomplete"
          true
        }
